services:
  techasset:
    build: .
    container_name: techasset-nfs
    restart: unless-stopped
    # Sin "ports" expuestos al host: el ingreso queda detrás de Caddy
    # (u otro reverse proxy) que comparte la red `proxy-network`.
    env_file:
      - .env
    environment:
      - PORT=8000
    volumes:
      - ./data:/app/data
    networks:
      - proxy-network

networks:
  proxy-network:
    external: true
